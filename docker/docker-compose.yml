services:
  db:
    image: postgres:16
    container_name: finder-db
    environment:
      POSTGRES_USER: finder
      POSTGRES_PASSWORD: finder_secret
      POSTGRES_DB: finder_db
    ports:
      - "5433:5432"
    volumes:
      - finder_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  finder_postgres_data:
